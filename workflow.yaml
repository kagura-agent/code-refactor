# code-refactor workflow
# Multi-model refactoring analysis → GitHub issues on target repo
# Refactor ≠ rewrite: tests must pass before and after

name: code-refactor
description: 3 models analyze code, produce refactoring proposals as GitHub issues
version: "1.0"
start: parse_request

nodes:
  parse_request:
    task: |
      Parse the refactor request. Extract:
      - owner: repo owner
      - repo: repo name
      - scope: file path, directory, module name, or "full" for whole repo
      - direction: optional refactoring direction (e.g., "make architecture more like Discord", "extract shared components", "reduce coupling")

      User may provide a GitHub link, natural language, or structured format.
      If direction is not specified, analysts will identify opportunities independently.

      Clone or pull the target repo to /tmp/code-refactor/<repo>/ for analysis.
      Run existing tests to establish baseline: record test command + pass/fail count.
      This baseline is critical — refactoring must not break tests.
    next: load_prompt

  load_prompt:
    task: |
      Load refactor analysis standard from `~/.openclaw/workspace/code-refactor/prompts/`:
      1. Check `prompts/<repo>.prompt.md` (project-specific)
      2. Fallback to `prompts/default.prompt.md`
      Read the file content — this is what analysts will use.

      Also gather project context:
      - Directory structure (tree, depth 3)
      - Package.json / Cargo.toml / go.mod / pyproject.toml — dependencies & scripts
      - Test framework and test count
      - Existing linter/formatter config
      - README summary
    next: spawn_analysts

  spawn_analysts:
    task: |
      Spawn 3 independent analyst subagents in parallel (sessions_spawn, mode: "run", runTimeoutSeconds: 0):

      - 🏗️ Arch (default-llm-sg/gpt-5.5) — Architecture perspective: module boundaries, dependency direction, separation of concerns, layering
      - 🔬 Lens (default-llm-sg/claude-opus-4.7) — Code quality perspective: readability, patterns, duplication, naming, abstraction levels
      - ⚡ Flux (default-llm-sg/gemini-3.1-pro-preview) — Efficiency perspective: dead code, unnecessary complexity, simpler alternatives, performance

      Each analyst gets:
      - The refactor prompt/standard
      - Project context (structure, deps, test baseline)
      - The scope to analyze
      - The direction (if specified)
      - `export https_proxy=http://127.0.0.1:1083`

      Each must output:
      - 3-7 concrete refactoring proposals
      - Each proposal: title, rationale, scope of change, risk level (low/medium/high), estimated complexity
      - Each proposal must explain WHY (not just "this is messy")
      - Each proposal must confirm: "existing tests should still pass because..."

      Analysts must NOT open issues or modify code — text output only.
      Use sessions_yield to wait for all 3 to complete.
    next: consolidate

  consolidate:
    task: |
      Merge the 3 analysts' proposals:

      1. Deduplicate: group proposals that target the same code/concern
      2. Consensus: if 2+ analysts independently identified the same issue → high confidence
      3. Rank by: confidence (consensus > solo) × impact × inverse-risk
      4. For each final proposal, synthesize the best reasoning from all analysts who mentioned it
      5. Add implementation hints (but keep it at proposal level, not PR-ready code)
      6. Tag each with source analysts (e.g., "identified by Arch + Lens")

      Filter out:
      - Proposals that are actually rewrites (changing behavior, not structure)
      - Proposals that would require new tests to validate (that's a feature, not a refactor)
      - Trivial formatting-only suggestions (leave those to linters)

      Output: ordered list of proposals ready to become issues.
    next: create_issues

  create_issues:
    task: |
      For each approved proposal, create a GitHub issue on the TARGET repo (owner/repo):

      Title: `[refactor] <concise title>`
      Labels: `refactor` (create label if it doesn't exist)
      Body template:
      ```
      ## Refactoring Proposal

      **Direction:** <direction if specified, or "general improvement">
      **Scope:** <files/modules affected>
      **Risk:** <low/medium/high>
      **Confidence:** <consensus/single-analyst>
      **Identified by:** <analyst names>

      ## Current State
      <what the code looks like now and why it's suboptimal>

      ## Proposed Change
      <what the refactoring would do — structural change, not implementation detail>

      ## Why This Is Safe
      <why existing tests should continue to pass>

      ## Implementation Hints
      <optional guidance for the implementing agent>

      ---
      *Generated by [code-refactor](https://github.com/kagura-agent/code-refactor) — multi-model analysis*
      ```

      Report: how many issues created, links to each.
    next: reflection

  reflection:
    task: |
      Post-analysis self-improvement. DO NOT SKIP.

      1. Record: Write to `runs/<repo>-<date>.md` — scope, direction, proposals generated, issues created
      2. Prompt Evolution: Did the analysts miss obvious things? Were proposals too vague? Update prompts/
      3. Analyst Assessment: Which analyst found the most actionable proposals? Update stats
      4. Commit and push with message `reflect: <repo> <date>`
    terminal: true
