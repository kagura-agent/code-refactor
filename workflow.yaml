# code-refactor workflow
# FlowForge enforced — no step can be skipped

name: code-refactor
description: Multi-model refactoring analysis — 3 analysts propose, target repo gets issues
version: "1.0"
start: parse_request

nodes:
  parse_request:
    task: |
      Parse the refactoring request. Extract:
      - **repo**: owner/repo (required)
      - **scope**: path, module, or "entire repo" (default: entire repo)
      - **direction**: optional architectural/design direction

      User may provide natural language, e.g.:
      - "refactor kagura-agent/cove src/server/"
      - "refactor openclaw/openclaw --direction 'simplify plugin system'"
      - "analyze kagura-agent/wiki for refactoring, make it more modular"

      Output: repo, scope, direction (or "none")
    next: load_context

  load_context:
    task: |
      Understand the target codebase before spawning analysts.

      1. Clone: `gh repo clone <repo> /tmp/refactor-<repo-name>` (if not already cloned)
      2. Quick scan: README, package.json/go.mod/pyproject.toml, directory structure
      3. Test framework: what test runner, how to run tests, test coverage
      4. Code conventions: naming, module structure, error handling patterns
      5. Check `prompts/<repo-name>.prompt.md` for project-specific analysis standards
         - Fallback to `prompts/default.prompt.md`

      Output a brief context summary (≤20 lines) that analysts will receive.
      This context helps analysts understand conventions without re-reading everything.

      Proxy: `export https_proxy=http://127.0.0.1:1083`
    next: spawn_analysts

  spawn_analysts:
    task: |
      Spawn 3 independent analyst subagents in parallel (sessions_spawn, mode: "run", runTimeoutSeconds: 0):

      - 🏗️ Arch: model `default-llm-sg/gpt-5.5`
      - 🔬 Lens: model `default-llm-sg/claude-opus-4.7`
      - ⚡ Flux: model `default-llm-sg/gemini-3.1-pro-preview`

      Each analyst receives:
      - The refactor prompt (from prompts/)
      - Repo + scope + direction
      - Context summary from load_context
      - Instruction to clone the repo themselves and analyze independently

      Each analyst must `export https_proxy=http://127.0.0.1:1083` first.
      Analysts must NOT create issues — text output only.

      Use sessions_yield to wait for all 3 to complete.
    next: consolidate

  consolidate:
    task: |
      Merge the 3 analyst reports into a unified refactoring plan:

      1. **Consensus items**: 2+ analysts identified the same opportunity → high confidence
      2. **Unique items**: only 1 analyst found it → include if well-justified, flag as single-source
      3. **Conflicts**: analysts disagree on approach → note both perspectives, pick the better-justified one
      4. **Dedup**: merge overlapping proposals into one, credit contributing analysts
      5. **Risk sort**: order by risk (lowest first) — we want safe wins first
      6. **Test impact**: flag any proposal that could break existing tests

      Output: numbered list of consolidated proposals, each with all fields from the prompt format.
    next: create_issues

  create_issues:
    task: |
      Create GitHub issues on the **target repo** for each consolidated proposal.

      For each proposal:
      ```bash
      gh issue create --repo <owner>/<repo> \
        --title "refactor: <short title>" \
        --body "<formatted body>" \
        --label "refactoring"
      ```

      Issue body format:
      ```
      ## Refactoring Proposal

      **What**: ...
      **Where**: ...
      **Why**: ...

      ### Proposed Approach
      ...

      ### Risk Assessment
      ...

      ### Test Impact
      ...

      **Effort**: S/M/L | **Priority**: P0/P1/P2
      **Confidence**: High (consensus) / Medium (single-source)

      ---
      _Generated by [Kagura Code Refactor](https://github.com/kagura-agent) — 3-model analysis_
      _Analysts: 🏗️ Arch (GPT-5.5) · 🔬 Lens (Claude Opus 4.7) · ⚡ Flux (Gemini 3.1 Pro)_
      ```

      If the "refactoring" label doesn't exist, create it first:
      `gh label create refactoring --repo <owner>/<repo> --description "Refactoring proposals" --color "1d76db"`

      Post a channel summary with links to all created issues.

      Proxy: `export https_proxy=http://127.0.0.1:1083`
    next: reflection

  reflection:
    task: |
      Post-analysis self-improvement. DO NOT SKIP.

      Layer 1 — Record: Write to `runs/<repo>-<date>.md`:
        - What was analyzed, what scope, what direction
        - How many proposals per analyst, how many consolidated
        - Which proposals were consensus vs single-source
        - Issue links created

      Layer 2 — Prompt Evolution: Review analyst outputs.
        - Did any analyst consistently miss things others caught?
        - Were proposals too vague or too prescriptive?
        - Update prompts/ if patterns emerge

      Layer 3 — Process: Did the workflow work smoothly?
        - Context loading sufficient?
        - Analysts had enough info to work independently?

      Commit and push changes: `evolve: <what changed>`
    terminal: true
